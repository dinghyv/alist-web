        document.addEventListener('DOMContentLoaded', function() {
            Sakana.setMute(false);

function simpleEncrypt(text) {
  return btoa(text.split('').reverse().join(''));
}
const correctPassword = "NTQwMg==";
if (localStorage.getItem('pan_password') !== correctPassword) {
  checkPassword("success", "输入密码进入");
}

function checkPassword(icon, title) {
  // 使用 SweetAlert2 显示密码弹窗
  Swal.fire({
     title: "V云盘SP",
    html: `

      <p id="ip-info" style="background-color: #2c3e50; color: white; padding: 10px; border-radius: 8px;">
        请输入校验码访问
      </p>
     <p id="info" style="color: red; padding: 10px; border-radius: 8px;">
        校验码为：2045
      </p>
      <p id="hint" style="color: white; padding: 10px; border-radius: 8px;">
        输入校验码以访问本站
      </p>
    `,
    icon: icon,
    imageUrl: 'https://images-cdn.vyhd.xyz/lsky-pro/2025/02/06/67a459f16fdba.webp',
    imageWidth: 250,
    imageHeight: 250,
    input: 'password',
    inputAttributes: {
      placeholder: "请输入密码"
    },
    showCancelButton: false,
    confirmButtonText: "确认",
    customClass: {
      popup: 'swal2-popup',
      title: 'swal2-title',
      input: 'swal2-input'
    },
    didOpen: () => {
      // 在弹窗打开时获取 IP 地址
      fetchIP();
    }
  }).then((result) => {
    if (!result.value) {
      checkPassword("warning", "请输入密码");
      return;
    }
    const encryptedInput = simpleEncrypt(result.value);
    if (encryptedInput === correctPassword) {
      Swal.fire("欢迎！", "", "success").then(() => {
        localStorage.setItem("pan_password", encryptedInput);
      });
    } else {
      checkPassword("error", "密码错误");
    }
  });
}

function fetchIP() {
  // 使用 JSONP 获取 IP 地址
  const script = document.createElement('script');
  script.src = 'https://api.ipify.org?format=jsonp&callback=updateIP';
  document.body.appendChild(script);
}

function updateIP(json) {
  // 更新弹窗中的 IP 地址
  const ipInfo = document.getElementById('ip-info');
  if (ipInfo) {
    ipInfo.textContent = "你的IP是：" + json.ip;
  }
}

// 在页面加载时调用
document.addEventListener("DOMContentLoaded", () => {
    fetchIP();
});
       
</script>
